            const counts = {};
            data.forEach(row => {
                const val = row[key] || 'N/A';
                counts[val] = (counts[val] || 0) + 1;
            });
            return Object.entries(counts).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value);

        const KPICards = ({ data, columns }) => {

        // ==================== CHART COMPONENTS (FIXED) ====================

        const BarChart = ({ data, column, chartId }) => {

        const LineChart = ({ data, chartId }) => {
            useEffect(() => {
                const timer = setTimeout(() => {
                    const stressMap = { 'Tidak pernah': 0, 'Jarang': 1, 'Sering': 2, 'Sangat sering': 3 };

                        x: idx + 1,
                        y: stressMap[row.tingkat_stres] !== undefined ? stressMap[row.tingkat_stres] : 1
                    }));

                    const smoothed = points.map((p, i) => {
                        const window = points.slice(Math.max(0, i-2), Math.min(points.length, i+3));
                        const avg = window.reduce((a,b) => a+b.y, 0) / window.length;
                        return { x: p.x, y: avg };
                    });

                    createChart(chartId, {
                        type: 'line',
                        data: {
                            labels: smoothed.map(p => `#${p.x}`),

        const AreaChart = ({ data, chartId }) => {

        // ==================== FILTER ====================
        const Filters = ({ data, filters, setFilters, columns }) => {
            const [expanded, setExpanded] = useState(true);

            const categoricalCols = columns.filter(col => {
                if (data.length === 0) return false;
                const unique = new Set(data.map(r => r[col])).size;
                return unique <= 15 && unique > 1;
            });

            const handleFilterChange = (col, value) => {
                setFilters(prev => ({
                    ...prev,
                    [col]: prev[col]?.includes(value) 
                        ? prev[col].filter(v => v !== value)

        // ==================== DATA TABLE ====================
        const DataTable = ({ data, columns }) => {
            const [search, setSearch] = useState('');
            const [sortCol, setSortCol] = useState(null);
            const [sortDir, setSortDir] = useState('asc');
            const [page, setPage] = useState(1);
            const [perPage, setPerPage] = useState(10);

            const filtered = useMemo(() => {
                let result = [...data];
                if (search) {
                    const s = search.toLowerCase();
                    result = result.filter(row => 
                        Object.values(row).some(v => String(v).toLowerCase().includes(s))
                    );
                }
                if (sortCol) {
                    result.sort((a, b) => {
                        const av = String(a[sortCol] || '').toLowerCase();
                        const bv = String(b[sortCol] || '').toLowerCase();
                        return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
                    });
                }
                return result;
            }, [data, search, sortCol, sortDir]);

            const totalPages = Math.ceil(filtered.length / perPage);
            const paginated = filtered.slice((page - 1) * perPage, page * perPage);

            const handleSort = (col) => {
                if (sortCol === col) {
                    setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
                } else {
                    setSortCol(col);
                    setSortDir('asc');

                setPage(1);

            return (

                                    value={search}
                                    onChange={(e) => { setSearch(e.target.value); setPage(1); }}
                                    className="pl-9 pr-4 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/20 w-full sm:w-64"
                                />
                            </div>
                            <button 
                                onClick={() => exportToCSV(filtered, 'data_export.csv')}
                                className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm rounded-lg border border-slate-700 transition-colors whitespace-nowrap"
                            >
                                <Icons.Download />
                                <span>CSV</span>
                            </button>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-slate-950 text-slate-400 uppercase text-xs">
                                <tr>
                                    {columns.map(col => (
                                        <th 
                                            key={col} 
                                            onClick={() => handleSort(col)}
                                            className="px-5 py-3 font-medium cursor-pointer hover:text-slate-200 transition-colors select-none"
                                        >
                                            <div className="flex items-center gap-1">
                                                {col.replace(/_/g, ' ')}
                                                {sortCol === col && (
                                                    <span className="text-indigo-400">{sortDir === 'asc' ? '↑' : '↓'}</span>
                                                )}
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800">
                                {paginated.map((row, idx) => (
                                    <tr key={idx} className="hover:bg-slate-800/50 transition-colors">
                                        {columns.map(col => (
                                            <td key={col} className="px-5 py-3 text-slate-300 whitespace-nowrap max-w-xs truncate">
                                                {row[col] || '-'}
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                                {paginated.length === 0 && (
                                    <tr>
                                        <td colSpan={columns.length} className="px-5 py-8 text-center text-slate-500">
                                            Tidak ada data yang cocok dengan filter
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>

                    <div className="flex flex-col sm:flex-row items-center justify-between gap-4 p-5 border-t border-slate-800">
                        <div className="flex items-center gap-2 text-sm text-slate-400">
                            <span>Rows per page:</span>
                            <select 
                                value={perPage} 
                                onChange={(e) => { setPerPage(Number(e.target.value)); setPage(1); }}
                                className="bg-slate-950 border border-slate-800 rounded px-2 py-1 text-sm text-slate-300 focus:outline-none focus:border-indigo-500"
                            >
                                {[10, 25, 50, 100].map(n => <option key={n} value={n}>{n}</option>)}
                            </select>
                            <span className="ml-2">{filtered.length} total records</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button 
                                onClick={() => setPage(p => Math.max(1, p-1))}
                                disabled={page === 1}
                                className="p-1.5 rounded-lg border border-slate-800 hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed text-slate-400 transition-colors"
                            >
                                <Icons.ChevronLeft />
                            </button>
                            <span className="text-sm text-slate-400 px-2">
                                Page {page} of {totalPages || 1}
                            </span>
                            <button 
                                onClick={() => setPage(p => Math.min(totalPages, p+1))}
                                disabled={page >= totalPages}
                                className="p-1.5 rounded-lg border border-slate-800 hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed text-slate-400 transition-colors"
                            >
                                <Icons.ChevronRight />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== INSIGHTS ====================
        const Insights = ({ data }) => {
            const insights = useMemo(() => {
                if (data.length === 0) return [];
                const results = [];

                const gender = countBy(data, 'jenis_kelamin');
                const maleCount = gender.find(g => g.name === 'Laki-laki')?.value || 0;
                const femaleCount = gender.find(g => g.name === 'Perempuan')?.value || 0;
                results.push({
                    type: 'dominance',
                    title: 'Dominasi Gender',
                    desc: `Laki-laki mendominasi dengan ${maleCount} responden (${Math.round(maleCount/data.length*100)}%) dibanding Perempuan ${femaleCount} (${Math.round(femaleCount/data.length*100)}%).`,
                    icon: Icons.Users,
                    color: 'border-l-4 border-indigo-500'
                });

                const stress = countBy(data, 'tingkat_stres');
                const highStress = (stress.find(s => s.name === 'Sering')?.value || 0) + (stress.find(s => s.name === 'Sangat sering')?.value || 0);
                results.push({
                    type: 'warning',
                    title: 'Tingkat Stres Tinggi',
                    desc: `${highStress} mahasiswa (${Math.round(highStress/data.length*100)}%) mengalami stres sering atau sangat sering. Hanya ${stress.find(s => s.name === 'Tidak pernah')?.value || 0} yang tidak pernah stres.`,
                    icon: Icons.AlertCircle,
                    color: 'border-l-4 border-rose-500'
                });

                const sleep = countBy(data, 'durasi_tidur');
                const badSleep = (sleep.find(s => s.name === 'Kurang dari 3 jam')?.value || 0) + (sleep.find(s => s.name === '4 - 5 jam')?.value || 0);
                results.push({
                    type: 'info',
                    title: 'Kualitas Tidur Buruk',
                    desc: `${badSleep} mahasiswa (${Math.round(badSleep/data.length*100)}%) tidur kurang dari 6 jam per hari, yang dapat mempengaruhi kesehatan dan akademik.`,
                    icon: Icons.Activity,
                    color: 'border-l-4 border-amber-500'
                });

                const exercise = countBy(data, 'frekuensi_olahraga');
                const noExercise = exercise.find(e => e.name === 'Tidak pernah')?.value || 0;
                results.push({
                    type: 'trend',
                    title: 'Aktivitas Fisik Rendah',
                    desc: `${noExercise} mahasiswa (${Math.round(noExercise/data.length*100)}%) tidak pernah berolahraga. Hambatan utama: "Tidak ada waktu (tugas kuliah)" dan "Kurang motivasi".`,
                    icon: Icons.TrendingUp,
                    color: 'border-l-4 border-emerald-500'
                });

                const ff = countBy(data, 'frekuensi_fast_food');
                const oftenFF = ff.find(f => f.name === 'Cukup sering (2-4 kali)')?.value || 0;
                if (oftenFF > data.length * 0.4) {
                    results.push({
                        type: 'anomaly',
                        title: 'Anomali: Fast Food',
                        desc: `Mayoritas (${Math.round(oftenFF/data.length*100)}%) mengonsumsi fast food cukup sering padahal aktivitas olahraga rendah.`,
                        icon: Icons.AlertCircle,
                        color: 'border-l-4 border-orange-500'
                    });
                }

                return results;
            }, [data]);

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {insights.map((insight, idx) => (
                        <div key={idx} className={`bg-slate-900 rounded-xl p-5 border border-slate-800 ${insight.color} hover:bg-slate-800/50 transition-all`}>
                            <div className="flex items-start gap-3">
                                <div className="p-2 rounded-lg bg-slate-800 text-slate-400 mt-0.5">
                                    <insight.icon />
                                </div>
                                <div>
                                    <h4 className="font-semibold text-slate-200 mb-1">{insight.title}</h4>
                                    <p className="text-sm text-slate-400 leading-relaxed">{insight.desc}</p>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // ==================== UPLOADER ====================
        const CSVUploader = ({ onDataLoaded, onClose }) => {
            const [dragActive, setDragActive] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleFile = (file) => {
                if (!file || (file.type !== 'text/csv' && !file.name.endsWith('.csv'))) {
                    setError('File harus berformat CSV');
                    return;
                }
                setLoading(true);
                setError(null);

                Papa.parse(file, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        setLoading(false);
                        if (results.data && results.data.length > 0) {
                            onDataLoaded(results.data, results.meta.fields);
                            onClose();
                        } else {
                            setError('CSV kosong atau tidak valid');
                        }
                    },
                    error: (err) => {
                        setLoading(false);
                        setError(err.message);
                    }
                });
            };

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') setDragActive(true);
                else if (e.type === 'dragleave') setDragActive(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files?.[0]) handleFile(e.dataTransfer.files[0]);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-lg mx-4 shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between mb-6">
                            <h2 className="text-lg font-bold text-slate-100">Upload Dataset CSV</h2>
                            <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-slate-800 text-slate-400 transition-colors">
                                <Icons.X />
                            </button>
                        </div>

                        <div 
                            className={`border-2 border-dashed rounded-xl p-8 text-center transition-all ${dragActive ? 'border-indigo-500 bg-indigo-500/10' : 'border-slate-700 bg-slate-950'}`}
                            onDragEnter={handleDrag}
                            onDragLeave={handleDrag}
                            onDragOver={handleDrag}
                            onDrop={handleDrop}
                        >
                            <div className="mb-4 flex justify-center">
                                <div className="p-3 bg-slate-800 rounded-full">
                                    <Icons.Upload />
                                </div>
                            </div>
                            <p className="text-sm text-slate-300 mb-2">Drag & drop file CSV di sini</p>
                            <p className="text-xs text-slate-500 mb-4">atau</p>
                            <label className="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg cursor-pointer transition-colors">
                                <span>Pilih File</span>
                                <input type="file" accept=".csv" className="hidden" onChange={(e) => e.target.files?.[0] && handleFile(e.target.files[0])} />
                            </label>
                            <p className="text-xs text-slate-600 mt-4">Support file besar (1000+ rows)</p>
                        </div>

                        {loading && (
                            <div className="mt-4 flex items-center justify-center gap-2 text-sm text-indigo-400">
                                <div className="w-4 h-4 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
                                Membaca data...
                            </div>
                        )}
                        {error && (
                            <div className="mt-4 p-3 bg-rose-500/10 border border-rose-500/20 rounded-lg text-sm text-rose-400">
                                {error}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const [data, setData] = useState(SAMPLE_DATA);
            const [columns, setColumns] = useState(Object.keys(SAMPLE_DATA[0]));
            const [filters, setFilters] = useState({});
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [darkMode, setDarkMode] = useState(true);
            const [showUploader, setShowUploader] = useState(false);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
            }, [darkMode]);

            const filteredData = useMemo(() => {
                let result = [...data];
                Object.entries(filters).forEach(([col, values]) => {
                    if (values && values.length > 0) {
                        result = result.filter(row => values.includes(row[col]));
                    }
                });
                return result;
            }, [data, filters]);

            const handleDataLoaded = (newData, newCols) => {
                setLoading(true);
                setTimeout(() => {
                    setData(newData);
                    setColumns(newCols);
                    setFilters({});
                    setLoading(false);
                }, 500);
            };

            // Cleanup all charts on unmount or tab change
            useEffect(() => {
                return () => {
                    Object.keys(chartRegistry).forEach(id => destroyChart(id));
                };
            }, [activeTab]);

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100">
                    <Sidebar 
                        collapsed={sidebarCollapsed} 
                        setCollapsed={setSidebarCollapsed} 
                        activeTab={activeTab} 
                        setActiveTab={setActiveTab}
                    />

                    <div className={`transition-all duration-300 ${sidebarCollapsed ? 'ml-16' : 'ml-64'}`}>
                        <Header 
                            darkMode={darkMode} 
                            setDarkMode={setDarkMode} 
                            onUploadClick={() => setShowUploader(true)}
                            data={filteredData}
                        />

                        <main className="p-6 max-w-7xl mx-auto">
                            {loading && (
                                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/90">
                                    <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                    <p className="text-slate-400 animate-pulse">Memproses data...</p>
                                </div>
                            )}

                            {activeTab === 'dashboard' && (
                                <div>
                                    <KPICards data={filteredData} columns={columns} />
                                    <Filters data={data} filters={filters} setFilters={setFilters} columns={columns} />

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                        <ChartCard title="Distribusi Jenis Kelamin" chartId="chart-bar-gender" onDownload={downloadChart}>
                                            <BarChart data={filteredData} column="jenis_kelamin" chartId="chart-bar-gender" />
                                        </ChartCard>
                                        <ChartCard title="Distribusi Tingkat Stres" chartId="chart-pie-stress" onDownload={downloadChart}>
                                            <PieChart data={filteredData} column="tingkat_stres" chartId="chart-pie-stress" />
                                        </ChartCard>
                                        <ChartCard title="Trend Stres (Rolling Average)" chartId="chart-line-stress" onDownload={downloadChart}>
                                            <LineChart data={filteredData} chartId="chart-line-stress" />
                                        </ChartCard>
                                        <ChartCard title="Distribusi Gender per Segmen" chartId="chart-area-gender" onDownload={downloadChart}>
                                            <AreaChart data={filteredData} chartId="chart-area-gender" />
                                        </ChartCard>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                        <ChartCard title="Frekuensi Olahraga" chartId="chart-bar-exercise" onDownload={downloadChart}>
                                            <BarChart data={filteredData} column="frekuensi_olahraga" chartId="chart-bar-exercise" />
                                        </ChartCard>
                                        <ChartCard title="Durasi Tidur" chartId="chart-pie-sleep" onDownload={downloadChart}>
                                            <PieChart data={filteredData} column="durasi_tidur" chartId="chart-pie-sleep" />
                                        </ChartCard>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'analytics' && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <ChartCard title="Frekuensi Makan" chartId="chart-bar-meal" onDownload={downloadChart}>
                                            <BarChart data={filteredData} column="frekuensi_makan" chartId="chart-bar-meal" />
                                        </ChartCard>
                                        <ChartCard title="Konsumsi Air" chartId="chart-pie-water" onDownload={downloadChart}>
                                            <PieChart data={filteredData} column="konsumsi_air" chartId="chart-pie-water" />
                                        </ChartCard>
                                        <ChartCard title="Hambatan Olahraga" chartId="chart-bar-obstacle" onDownload={downloadChart}>
                                            <BarChart data={filteredData} column="hambatan_olahraga" chartId="chart-bar-obstacle" />
                                        </ChartCard>
                                        <ChartCard title="Penanganan Stres" chartId="chart-pie-coping" onDownload={downloadChart}>
                                            <PieChart data={filteredData} column="penanganan_stres" chartId="chart-pie-coping" />
                                        </ChartCard>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'table' && (
                                <div>
                                    <DataTable data={filteredData} columns={columns} />
                                </div>
                            )}

                            {activeTab === 'insights' && (
                                <div className="space-y-6">
                                    <div className="bg-gradient-to-r from-indigo-600/20 to-cyan-600/20 border border-indigo-500/30 rounded-xl p-6 mb-6">
                                        <h2 className="text-xl font-bold text-slate-100 mb-2">AI-Powered Data Insights</h2>
                                        <p className="text-slate-400">Analisis otomatis berdasarkan dataset yang difilter saat ini ({filteredData.length} records).</p>
                                    </div>
                                    <Insights data={filteredData} />
                                </div>
                            )}
                        </main>
                    </div>

                    {showUploader && (
                        <CSVUploader 
                            onDataLoaded={handleDataLoaded} 
                            onClose={() => setShowUploader(false)} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
